name = "insightflare"
main = "./cf-worker.js"
compatibility_date = "2026-03-01"
workers_dev = true
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = "./.open-next/assets"
binding = "ASSETS"

[vars]
NEXTJS_ENV = "production"
SESSION_WINDOW_MINUTES = "30"
SCRIPT_CACHE_TTL_SECONDS = "3600"
PARQUET_WASM_URL = "https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.1/esm/parquet_wasm_bg.wasm"
REQUIRE_TEAM_MEMBERSHIP = "1"
BOOTSTRAP_ADMIN_USERNAME = "admin"
BOOTSTRAP_ADMIN_EMAIL = "admin@insightflare.local"
BOOTSTRAP_ADMIN_NAME = "System Administrator"

[triggers]
crons = ["0 * * * *"]

[[durable_objects.bindings]]
name = "INGEST_DO"
class_name = "IngestDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IngestDurableObject"]

[[d1_databases]]
binding = "DB"
database_name = "insightflare"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "../edge/migrations"

[[analytics_engine_datasets]]
binding = "ANALYTICS"

# Optional: enable when archive-to-R2 is configured.
# [[r2_buckets]]
# binding = "ARCHIVE_BUCKET"
# bucket_name = "insightflare-archive"
# preview_bucket_name = "insightflare-archive-preview"
