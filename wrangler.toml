name = "insightflare"
main = "./cf-worker.js"
compatibility_date = "2026-03-01"
workers_dev = true
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = "./.open-next/assets"
binding = "ASSETS"

[vars]
SESSION_WINDOW_MINUTES = "30" # 会话窗口大小，单位：分钟
SCRIPT_CACHE_TTL_SECONDS = "3600" # 脚本缓存时间，单位：秒
PARQUET_WASM_URL = "https://cdn.jsdelivr.net/npm/parquet-wasm@0.7.1/esm/parquet_wasm_bg.wasm" # Parquet WASM 模块 URL
ANALYTICS_ACCOUNT_ID = "442fe5198bff93bdf60d4223d9618033" # 你的 Cloudflare Account ID
INSIGHTFLARE_EDGE_URL="https://insight.ravelloh.com" # InsightFlare 前端 URL

[triggers]
crons = ["0 * * * *"]

[[durable_objects.bindings]]
name = "INGEST_DO"
class_name = "IngestDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IngestDurableObject"]

[[d1_databases]]
binding = "DB"
database_name = "insightflare"
database_id = "391c1df6-dd3f-44f0-991c-63c7873b7d6a" # 改成你自己的 D1 数据库 ID
migrations_dir = "./migrations"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "insightflare_events"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Optional: enable when archive-to-R2 is configured.
# [[r2_buckets]]
# binding = "ARCHIVE_BUCKET"
# bucket_name = "insightflare-archive"
# preview_bucket_name = "insightflare-archive-preview"
